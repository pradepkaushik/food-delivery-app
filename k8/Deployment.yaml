apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-app
  labels:
    app: food-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: food-app

  template:
    metadata:
      labels:
        app: food-app

    spec:
      containers:
      - name: food-app

        image: 596055752329.dkr.ecr.ap-south-1.amazonaws.com/food-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
